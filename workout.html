<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Training Planner - Workout</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body data-page="workout">
    <header class="app-header">
      <h1>Workout</h1>
      <p class="subtle">Log sets, reps, load, and effort</p>
    </header>

    <main class="page">
      <section class="card">
        <div class="card-header">
          <h2 id="workout-session-title">Loading workout...</h2>
          <span class="badge" id="workout-session-week">Week</span>
        </div>
        <p id="workout-session-meta" class="subtle">Load a generated session from Today.</p>
      </section>

      <section class="card">
        <h2>Prep Work</h2>
        <div id="workout-prep" class="stack"></div>
      </section>

      <section id="workout-exercises" class="stack"></section>

      <section class="card">
        <button class="button button-primary" id="finish-workout-button" type="button">Finish Workout</button>
        <p class="subtle" id="workout-save-status">Nothing saved yet.</p>
      </section>

      <section class="card feedback-section" id="post-workout-feedback" hidden>
        <h2>Post-Workout Feedback</h2>
        <div id="feedback-muscles" class="stack"></div>
        <div id="feedback-overall" class="stack"></div>
        <button class="button button-primary" id="submit-feedback-button" type="button">Submit Feedback</button>
        <p class="subtle" id="feedback-save-status"></p>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation"></nav>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/feedback.js"></script>
    <script src="js/workout.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
