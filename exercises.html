<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Training Planner - Exercises</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body data-page="exercises">
    <header class="app-header">
      <h1>Exercises</h1>
      <p class="subtle">Library grouped by muscle</p>
    </header>

    <main class="page">
      <section class="card">
        <h2>Library Browser</h2>
        <div class="form-grid">
          <label>
            Search exercises
            <input id="exercise-search" type="search" placeholder="Search name, equipment, notes">
          </label>
          <label>
            Muscle Group
            <select id="exercise-filter-muscle">
              <option value="all">All muscle groups</option>
            </select>
          </label>
          <label>
            Status
            <select id="exercise-filter-status">
              <option value="all">All statuses</option>
              <option value="preferred">Preferred</option>
              <option value="conditional">Conditional</option>
              <option value="neutral">Neutral</option>
              <option value="prep">Prep</option>
              <option value="avoid">Avoid</option>
            </select>
          </label>
          <label class="checkbox-row">
            <input id="filter-show-avoid" type="checkbox">
            Show avoid exercises
          </label>
          <label class="checkbox-row">
            <input id="filter-preferred-only" type="checkbox">
            Preferred only
          </label>
          <label class="checkbox-row">
            <input id="filter-shoulder-friendly" type="checkbox">
            Shoulder-friendly only
          </label>
          <label class="checkbox-row">
            <input id="filter-lower-back-friendly" type="checkbox">
            Lower-back-friendly only
          </label>
        </div>
      </section>

      <section id="exercise-library" class="stack"></section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation"></nav>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
