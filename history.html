<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Training Planner - History</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body data-page="history">
    <header class="app-header">
      <h1>History</h1>
      <p class="subtle">Progress and volume placeholders</p>
    </header>

    <main class="page">
      <section class="card">
        <h2>Volume Recommendations</h2>
        <div id="volume-recommendations" class="stack">
          <p class="subtle">No pending recommendations.</p>
        </div>
      </section>

      <section class="card">
        <h2>Previous Sessions</h2>
        <div id="previous-sessions" class="stack">
          <p class="subtle">No completed sessions yet.</p>
        </div>
      </section>

      <section class="card">
        <h2>Weekly Sets Per Muscle</h2>
        <div id="weekly-sets" class="volume-grid"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation"></nav>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/feedback.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
