<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Training Planner - Setup</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body data-page="setup">
    <header class="app-header">
      <h1>Setup</h1>
      <p class="subtle">Muscle priority and mesocycle defaults</p>
    </header>

    <main class="page">
      <section class="card">
        <h2>Goal</h2>
        <div class="form-grid">
          <label>
            Goal name
            <input id="goal-name" type="text" readonly>
          </label>
          <label>
            Bodyweight kg
            <input id="bodyweight-kg" type="number" min="40" max="180" step="0.1">
          </label>
          <label>
            Target date
            <input id="target-date" type="date" readonly>
          </label>
          <label>
            Training days per week
            <input id="training-days-per-week" type="number" min="1" max="7">
          </label>
          <label>
            Preferred session length
            <input id="session-length-minutes" type="number" min="30" max="150" step="5">
          </label>
          <label>
            Active mesocycle week
            <input id="current-week" type="number" min="1" max="8">
          </label>
        </div>
      </section>

      <section class="card">
        <h2>Priority Muscles</h2>
        <div id="priority-muscles" class="stack priority-list"></div>
      </section>

      <section class="card">
        <h2>Injury Settings</h2>
        <div id="injury-settings" class="stack"></div>
      </section>

      <section class="card">
        <button class="button button-primary" id="save-settings-button" type="button">Save Settings</button>
        <p class="subtle" id="settings-save-status">Settings load from this device.</p>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation"></nav>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
